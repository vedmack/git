<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Git Task Helper</title>
    <link href="https://fonts.googleapis.com/css?family=Material+Icons|Material+Icons+Outlined|Material+Icons+Two+Tone|Material+Icons+Round|Material+Icons+Sharp" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
  <input class="d-source" id="source" placeholder="Paste Github issue title (including the #Number)" />

  <div class="d-data-wrapper">
    <select class="d-type">
      <option value="feat">feat</option>
      <option value="fix">fix</option>
      <option value="refactor">refactor</option>
    </select>
  </div>
  
  <div class="d-data-wrapper">
    <textarea class="d-branch" placeholder="Branch name" spellcheck="false"></textarea>
    <button onclick="copyBranch()" class="material-icons-outlined">content_copy</button>
  </div>

  <div class="d-data-wrapper">
    <textarea class="d-comment" placeholder="Commit Message"></textarea>
    <button onclick="copyComment()" class="material-icons-outlined" title="Copy comment">content_copy</button>
  </div>

  <div class="d-data-wrapper">
    <input class="d-jsonkey-in" id="jsonkey-in" placeholder="Enter text for JSON key conversion" />
  </div>

  <div class="d-data-wrapper">
    <textarea class="d-jsonkey-output" placeholder="JSON KEY"></textarea>
    <button onclick="copyJSONKey()" class="material-icons-outlined" title="Copy JSON">content_copy</button>
  </div>
</div>

    <script src="script.js"></script>
</body>
</html>
